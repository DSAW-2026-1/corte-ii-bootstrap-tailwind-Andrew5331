<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tailwind | Stats Preview Card</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mainBg: 'hsl(233, 47%, 7%)',
            cardBg: 'hsl(244, 38%, 16%)',
            accent: 'hsl(277, 64%, 61%)'
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            lexend: ['Lexend Deca', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>

<body class="bg-mainBg flex items-center justify-center min-h-screen font-inter px-6">

  <!-- Card -->
  <div class="bg-cardBg rounded-xl overflow-hidden max-w-5xl w-full flex flex-col md:flex-row">

    <!-- Text Section -->
    <div class="p-10 md:p-16 flex flex-col justify-center text-center md:text-left md:w-1/2">
      
      <h1 class="text-white text-3xl md:text-4xl font-bold leading-tight">
        Get <span class="text-accent">insights</span> that help your business grow.
      </h1>

      <p class="text-white/75 text-[15px] mt-6 leading-relaxed">
        Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.
      </p>

      <!-- Stats -->
      <div class="mt-10 flex flex-col md:flex-row md:space-x-12 space-y-8 md:space-y-0">

        <div>
          <h2 class="text-white text-xl font-bold">10k+</h2>
          <p class="text-white/60 text-xs tracking-widest font-lexend mt-2">COMPANIES</p>
        </div>

        <div>
          <h2 class="text-white text-xl font-bold">314</h2>
          <p class="text-white/60 text-xs tracking-widest font-lexend mt-2">TEMPLATES</p>
        </div>

        <div>
          <h2 class="text-white text-xl font-bold">12M+</h2>
          <p class="text-white/60 text-xs tracking-widest font-lexend mt-2">QUERIES</p>
        </div>

      </div>

    </div>

    <!-- Image Section -->
    <div class="relative md:w-1/2 order-first md:order-last">
      <img 
        src="./images/image-header-desktop.jpg" 
        alt="Office working environment"
        class="w-full h-full object-cover"
      >
      <div class="absolute inset-0 bg-accent mix-blend-multiply"></div>
    </div>

  </div>

</body>
</html>
