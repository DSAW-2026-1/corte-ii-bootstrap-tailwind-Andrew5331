<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bootstrap | Stats Preview Card</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: hsl(233, 47%, 7%);
      font-family: 'Inter', sans-serif;
    }

    .card-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stats-card {
      background-color: hsl(244, 38%, 16%);
      border-radius: 12px;
      overflow: hidden;
      max-width: 1100px;
    }

    .card-content {
      padding: 60px;
    }

    .highlight {
      color: hsl(277, 64%, 61%);
    }

    .description {
      color: hsla(0, 0%, 100%, 0.75);
      font-size: 15px;
      margin-top: 25px;
      line-height: 1.6;
    }

    .stat-number {
      color: white;
      font-weight: 700;
      font-size: 22px;
    }

    .stat-label {
      color: hsla(0, 0%, 100%, 0.6);
      font-family: 'Lexend Deca', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      margin-top: 5px;
    }

    .image-container {
      position: relative;
      height: 100%;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-overlay {
      position: absolute;
      inset: 0;
      background-color: hsl(277, 64%, 61%);
      mix-blend-mode: multiply;
    }

    @media (max-width: 768px) {
      .card-content {
        padding: 40px 30px;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <div class="card-wrapper">
    <div class="container">
      <div class="row stats-card g-0">

        <!-- Text Section -->
        <div class="col-md-6 d-flex flex-column justify-content-center card-content">
          <h2 class="text-white fw-bold">
            Get <span class="highlight">insights</span> that help your business grow.
          </h2>

          <p class="description">
            Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.
          </p>

          <div class="row mt-5 text-center text-md-start">
            <div class="col-12 col-md-4 mb-4 mb-md-0">
              <div class="stat-number">10k+</div>
              <div class="stat-label">COMPANIES</div>
            </div>

            <div class="col-12 col-md-4 mb-4 mb-md-0">
              <div class="stat-number">314</div>
              <div class="stat-label">TEMPLATES</div>
            </div>

            <div class="col-12 col-md-4">
              <div class="stat-number">12M+</div>
              <div class="stat-label">QUERIES</div>
            </div>
          </div>
        </div>

        <!-- Image Section -->
        <div class="col-md-6 image-container order-first order-md-last">
          <img src="./images/image-header-desktop.jpg" alt="Office analytics">
          <div class="image-overlay"></div>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
